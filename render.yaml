services:
  - type: web
    name: burpsite-api
    runtime: node
    region: virginia  # Change to closest region
    plan: starter  # free | starter | standard
    
    # Source code
    repo: https://github.com/jamiljuma2/Burpsite.git
    branch: main
    
    # Build & Run
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    
    # Environment Variables (set in dashboard - do not hardcode secrets)
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: ${JWT_SECRET}  # Set in dashboard as secret
      - key: DATABASE_URL
        value: ${DATABASE_URL}  # Set in dashboard as secret
      - key: FRONTEND_URL
        value: ${FRONTEND_URL}  # Set in dashboard
      - key: PROXY_PORT
        value: 8888
    
    # Auto-deploy on push to main
    autoDeploy: true
