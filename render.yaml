services:
  - type: web
    name: burpsite-api
    env: node
    region: virginia  # Change to closest region
    plan: starter  # free | starter | starter-plus | standard
    
    # Source code
    repo: https://github.com/jamiljuma2/Burpsite.git
    branch: main
    
    # Build & Run
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    
    # Environment Variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        fromDatabase: true  # Must be set in dashboard
      - key: DATABASE_URL
        fromDatabase: true  # Must be set in dashboard
      - key: FRONTEND_URL
        fromDatabase: true  # Must be set in dashboard
      - key: PROXY_PORT
        value: 8888
    
    # Health Check
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInitialDelay: 60
    healthCheckInterval: 60
    
    # Limits (Starter plan)
    maxInstanceCount: 1
    minInstanceCount: 1
    cpuAllocationPercent: 100
    
    # Auto-deploy
    autoDeploy: true
    
    # Persistent disk (optional, for logs)
    disk:
      - path: /var/log
        sizeMb: 1024
