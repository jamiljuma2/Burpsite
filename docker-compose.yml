version: '3.8'

services:
  # PostgreSQL is hosted on Neon, no local database needed
  # Update DATABASE_URL in .env with your Neon connection string
  
  backend:
    build: ./backend
    container_name: burpsite-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      # Use Neon connection string
      DATABASE_URL: ${DATABASE_URL:-postgresql://user:password@ep-xxxx.us-east-1.neon.tech/burpsite}
      # Or use individual parameters
      DB_HOST: ${DB_HOST:-ep-xxxx.us-east-1.neon.tech}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-burpsite}
      DB_USER: ${DB_USER:-neon_user}
      DB_PASSWORD: ${DB_PASSWORD:-your_password}
      DB_SSL: ${DB_SSL:-true}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_key_change_this}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build: ./frontend
    container_name: burpsite-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src

networks:
  default:
    name: burpsite-network
